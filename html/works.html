<!doctype html>

                    <span class="work-category">Video</span>

                    <span class="work-category">Design</span>
                    <span class="work-title">Brand Identity</span>
                    <span class="work-year">2024</span>
                </div>

                    <a href="https://www.instagram.com/d.amixn_/" target="_blank" rel="noopener noreferrer">
